     1|# openUBMC Code RAG Configuration
     2|# GitCode repository configuration
     3|git:
     4|  base_url: "https://gitcode.com/openUBMC"
     5|  clone_dir: "./data/repos"
     6|  branch: "main"
     7|  auth_token: ""
     8|
     9|  # Repositories to index
    10|  repos:
    11|    - name: "sensor"
    12|      description: "IPMI sensor and SEL event management"
    13|    - name: "sensor_mgmt"
    14|      description: "Sensor management service"
    15|    - name: "devmon"
    16|      description: "Device monitoring"
    17|    - name: "vpd"
    18|      description: "Vital Product Data management"
    19|    - name: "frudata"
    20|      description: "FRU data management"
    21|    - name: "fructrl"
    22|      description: "FRU control"
    23|    - name: "bus_tools"
    24|      description: "Bus communication tools"
    25|    - name: "libipmi"
    26|      description: "IPMI library"
    27|      language_hint: "cpp"
    28|    - name: "power_mgmt"
    29|      description: "Power management"
    30|    - name: "bios"
    31|      description: "BIOS management"
    32|    - name: "pcie_device"
    33|      description: "PCIe device management"
    34|    - name: "mdb_interface"
    35|      description: "MDB interface library"
    36|    - name: "infrastructure"
    37|      description: "Infrastructure and build system"
    38|
    39|# File ingestion settings
    40|ingestion:
    41|  languages:
    42|    lua:
    43|      extensions: [".lua"]
    44|      enabled: true
    45|    c:
    46|      extensions: [".c", ".h"]
    47|      enabled: true
    48|    cpp:
    49|      extensions: [".cpp", ".hpp", ".cc", ".cxx"]
    50|      enabled: true
    51|    python:
    52|      extensions: [".py"]
    53|      enabled: false
    54|    json:
    55|      extensions: [".json"]
    56|      enabled: true
    57|      patterns:
    58|        - "mds/service.json"
    59|        - "mds/model.json"
    60|        - "mds/ipmi.json"
    61|        - "mds/types.json"
    62|    markdown:
    63|      extensions: [".md"]
    64|      enabled: false
    65|
    66|  exclude_paths:
    67|    - "build/"
    68|    - "gen/"
    69|    - ".git/"
    70|    - "test/"
    71|    - "tests/"
    72|    - "dt_test/"
    73|    - "third_party/"
    74|
    75|  max_chunk_lines: 200
    76|  min_chunk_lines: 5
    77|  overlap_lines: 5
    78|
    79|# Indexing configuration
    80|indexing:
    81|  persist_dir: "./data/index"
    82|  embedding_provider: "dashscope"    # DashScope text-embedding-v3 API
    83|  embedding_dim: 1024
    84|  dashscope_api_key: ""             # Leave empty to use .env or DASHSCOPE_API_KEY env var
    85|  chroma_collection: "openubmc_code"
    86|  bm25_k1: 1.5
    87|  bm25_b: 0.75
    88|
    89|# Search configuration
    90|search:
    91|  rrf_k: 60
    92|  default_top_k: 10
    93|  max_top_k: 50
    94|  bm25_weight: 0.5
    95|  dense_weight: 0.5
    96|  code_query_bm25_boost: 0.15
    97|  symbol_match_boost: 1.5
    98|  filepath_match_boost: 1.3
    99|  mds_model_match_boost: 2.0
   100|  diversity_max_per_file: 3
   101|  # Cross-encoder reranker (P0, optional)
   102|  cross_encoder_enabled: false
   103|  cross_encoder_model: "BAAI/bge-reranker-v2-m3"
   104|  cross_encoder_device: "cpu"
   105|  # DashScope qwen3-rerank (6-B, optional, requires DASHSCOPE_API_KEY)
   106|  dashscope_reranker_enabled: true
   107|  dashscope_reranker_model: "qwen3-rerank"
   108|  dashscope_reranker_top_n: 20
   109|
   110|# MCP server configuration
   111|mcp:
   112|  transport: "stdio"
   113|  host: "localhost"
   114|  port: 8080
   115|